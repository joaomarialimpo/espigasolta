<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Espiga Solta</title>

<!-- CSS externo -->
<link rel="stylesheet" href="style.css">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- SheetJS para exportar Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">
  <h2>Trabalho</h2>

  <form id="form">
    <label>Data</label>
    <input type="date" id="data">

    <label>Hora Entrada</label>
    <input type="time" id="entrada">

    <label>Hora Saída</label>
    <input type="time" id="saida">

    <label>Local</label>
    <input type="text" id="local">

    <label>Distância (km)</label>
    <input type="number" id="distancia">

    <label>Observações</label>
    <textarea id="obs" rows="3"></textarea>

    <button type="submit">Guardar Trabalho</button>
  </form>

  <button class="export" onclick="exportarExcel()">Exportar Excel</button>

  <table id="tabela">
    <thead>
      <tr>
        <th>Data</th>
        <th>Entrada</th>
        <th>Saída</th>
        <th>Local</th>
        <th>Distância</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// ==== CONFIGURAÇÃO SUPABASE ====
// Substituir pelos teus dados
const SUPABASE_URL = "https://cvsbuzcdporawvunyous.supabase.co"
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2c2J1emNkcG9yYXd2dW55b3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTE4NTYsImV4cCI6MjA4OTE2Nzg1Nn0.uwjIQPohUH7u_kwgprrT1o_MgJTCGBHmT3imlt8amEc"
// ==== Envio ====
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault()
  const values = {
    data: data.value,
    hora_entrada: entrada.value,
    hora_saida: saida.value,
    local: local.value,
    distancia: distancia.value,
    observacoes: obs.value
  }
  console.log("Tentando inserir:", values)
  const { data: result, error } = await supabase.from("trabalhos").insert(values)
  if (error) {
    console.error("Erro:", error)
    alert("Erro: " + error.message)
  } else {
    console.log("Guardado:", result)
    alert("Trabalho guardado!")
    carregar()
    document.getElementById("form").reset()
  }
}

// ==== Carregar dados ====
async function carregar(){
  const { data, error } = await supabase.from("trabalhos").select("*").order("data",{ascending:false})
  if (error) { console.error(error); return }
  const tbody = document.querySelector("tbody")
  tbody.innerHTML = ""
  data.forEach(t => {
    tbody.innerHTML += `
      <tr>
        <td>${t.data}</td>
        <td>${t.hora_entrada}</td>
        <td>${t.hora_saida}</td>
        <td>${t.local || ""}</td>
        <td>${t.distancia || ""}</td>
      </tr>
    `
  })
}

// ==== Exportar Excel ====
function exportarExcel(){
  let tabela = document.getElementById("tabela")
  let wb = XLSX.utils.table_to_book(tabela)
  XLSX.writeFile(wb, "trabalhos.xlsx")
}

// Carregar dados ao abrir a página
carregar()
</script>

</body>
</html>
